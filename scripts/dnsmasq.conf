# LeLamp AP Mode DHCP/DNS Configuration
# 这是 dnsmasq 的默认配置模板
# 实际使用时，程序会动态生成配置文件

# 监听接口
interface=wlan0

# 绑定特定接口
bind-interfaces

# DHCP 地址范围
dhcp-range=192.168.4.20,192.168.4.100,12h

# DHCP 选项
dhcp-option=3,192.168.4.1  # 网关
dhcp-option=6,192.168.4.1  # DNS

# 所有域名解析到 AP IP（用于 Captive Portal）
address=/#/192.168.4.1

# 不使用 /etc/resolv.conf
no-resolv

# 上游 DNS 服务器
server=8.8.8.8
server=8.8.4.4

# DNS 缓存大小
cache-size=150

# 日志
log-queries
log-dhcp
