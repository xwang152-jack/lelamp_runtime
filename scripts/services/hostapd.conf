# LeLamp AP Mode Configuration
# 这是 hostapd 的默认配置模板
# 实际使用时，程序会动态生成配置文件

# 接口配置
interface=wlan0

# 驱动程序
driver=nl80211

# 热点配置
ssid=LeLamp-Setup
hw_mode=g
channel=6

# 认证配置
auth_algs=1
wpa=2
wpa_passphrase=lelamp123
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# 国家代码
country_code=CN

# IEEE 802.11n 配置
ieee80211n=1
wmm_enabled=1
